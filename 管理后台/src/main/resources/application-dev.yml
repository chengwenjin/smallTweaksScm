spring:
  datasource:
    url: jdbc:mysql://localhost:3306/small_tweaks_scm?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
      enabled: true

file:
  upload-path: uploads/
  max-size: 10485760

logging:
  level:
    com.baserbac: DEBUG
    org.springframework.security: DEBUG
