server:
  port: 10040
  servlet:
    context-path: /

spring:
  application:
    name: base-rbac-server
  profiles:
    active: dev
  # Jackson配置
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml

# JWT配置
jwt:
  secret: ${JWT_SECRET:dev-secret-key-please-change-in-production-64-characters-minimum}
  access-token-expiration: 1800000    # 30分钟(ms)
  refresh-token-expiration: 604800000 # 7天(ms)

# 密码配置
password:
  bcrypt-strength: 10

# 登录锁定配置
login-lock:
  threshold: 5
  lock-duration: 1800000              # 30分钟(ms)
  max-lock-duration: 86400000         # 24小时(ms)

# Knife4j配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn
